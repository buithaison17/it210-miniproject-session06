<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chi tiet khoa hoc</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<header class="text-dark mt-3 mx-5">
  <img src="https://static.ybox.vn/2024/11/6/1732952492691-logo-rikkei2.png" alt="logo" width="150" height="50">
  <hr class="mt-3 mb-0">
</header>

<main class="container py-4">
  <a class="btn btn-outline-secondary mb-4" th:href="@{/courses}">Quay lại danh sách</a>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
          <h1 class="h3 mb-2" th:text="${course.courseName}">Tên khóa học</h1>
          <p class="text-secondary mb-0">
            <strong>Mã khóa học:</strong>
            <span th:text="${course.courseCode}">JAVA-001</span>
          </p>
        </div>
        <span class="badge rounded-pill"
              th:classappend="${course.full} ? ' text-bg-danger' : ' text-bg-success'"
              th:text="${course.full} ? 'Đã full' : 'Còn chỗ'">
                    Còn chỗ
                </span>
      </div>

      <div class="row g-3 mt-1">
        <div class="col-md-6">
          <div class="border rounded p-3 bg-white h-100">
            <h2 class="h6">Mô tả</h2>
            <p class="mb-0" th:text="${course.description}">Mô tả khóa học</p>
          </div>
        </div>
        <div class="col-md-6">
          <div class="border rounded p-3 bg-white h-100">
            <h2 class="h6">Giảng viên</h2>
            <p class="mb-0" th:text="${course.teacherName}">Tên giảng viên</p>
          </div>
        </div>
        <div class="col-md-4">
          <div class="border rounded p-3 bg-white h-100">
            <h2 class="h6">Trình độ</h2>
            <p class="mb-0" th:text="${course.levelCourse}">BEGINNER</p>
          </div>
        </div>
        <div class="col-md-4">
          <div class="border rounded p-3 bg-white h-100">
            <h2 class="h6">Thời lượng</h2>
            <p class="mb-0" th:text="${course.duration}">30 gio</p>
          </div>
        </div>
        <div class="col-md-4">
          <div class="border rounded p-3 bg-white h-100">
            <h2 class="h6">Học phí</h2>
            <p class="mb-0" th:text="${#numbers.formatDecimal(course.price, 0, 'COMMA', 0, 'POINT')} + ' VND'">1500000 VND</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
<footer class="bg-light text-dark text-center py-3 mt-auto">
  <p class="mb-0">@ 2026 | EDU-PATH | NHÓM 1</p>
</footer>

</body>
</html>
